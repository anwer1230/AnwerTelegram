<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستودع الملفات</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        .container { max-width: 600px; margin: auto; }
        input, button { margin: 0.5rem 0; padding: 0.5rem; width: 100%; }
        #fileList { margin-top: 2rem; }
        .file-item { border: 1px solid #ddd; padding: 0.5rem; margin: 0.5rem 0; border-radius: 5px; }
        .download-link { color: blue; text-decoration: underline; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>رفع ملفات إلى الخادم</h1>
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">رفع الملف</button>
        <div id="uploadStatus"></div>

        <h2>الملفات المخزنة</h2>
        <div id="fileList">جاري التحميل...</div>
    </div>

    <script>
        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) {
                alert('الرجاء اختيار ملف أولاً');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            document.getElementById('uploadStatus').innerHTML = result.message || result.error;
            loadFiles(); // تحديث القائمة
        }

        async function loadFiles() {
            const response = await fetch('/files');
            const files = await response.json();
            const listDiv = document.getElementById('fileList');
            if (files.length === 0) {
                listDiv.innerHTML = 'لا توجد ملفات';
                return;
            }
            listDiv.innerHTML = files.map(file => `
                <div class="file-item">
                    <strong>${file.name}</strong> (${(file.size / 1024).toFixed(2)} كيلوبايت)
                    <a href="/download/${file.name}" class="download-link" download>تحميل</a>
                </div>
            `).join('');
        }

        loadFiles();
    </script>
</body>
</html>
